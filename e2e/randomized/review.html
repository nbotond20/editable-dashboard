<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 24px; max-width: 960px; margin: 0 auto; }

  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
  .toolbar label { font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .counter { font-size: 13px; color: #888; }
  .spacer { flex: 1; }
  .btn { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn:hover { background: #252525; }
  .btn-primary { background: #1a5cff; border-color: #1a5cff; color: #fff; }

  .nav { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .nav-pos { font-size: 14px; font-variant-numeric: tabular-nums; min-width: 60px; text-align: center; }
  .nav-arrow { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .nav-arrow:hover:not(:disabled) { background: #252525; }
  .nav-arrow:disabled { opacity: 0.25; cursor: default; }
  .kbd { font-size: 10px; color: #555; background: #141414; border: 1px solid #333; border-radius: 3px; padding: 1px 4px; }

  /* ── Card ── */
  .card { background: #111; border-radius: 12px; overflow: hidden; }
  .card.pass { border: 1px solid #22c55e30; }
  .card.bug { border: 1px solid #ef444440; }
  .card.bad-test { border: 1px solid #66666640; }
  .card.unverified { border: 1px solid #f59e0b30; }

  .card-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.pass { background: #22c55e; }
  .status-dot.bug { background: #ef4444; }
  .status-dot.bad-test { background: #666; }
  .status-dot.unverified { background: #f59e0b; }
  .card-title { font-size: 14px; font-weight: 600; flex: 1; }
  .step-info { color: #666; font-weight: 400; font-size: 13px; }
  .status-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
  .status-badge.pass { background: #14532d; color: #4ade80; }
  .status-badge.bug { background: #450a0a; color: #f87171; }
  .status-badge.bad-test { background: #262626; color: #999; }
  .status-badge.unverified { background: #422006; color: #fbbf24; }

  /* ── Action Banner ── */
  .action-banner { display: flex; align-items: center; gap: 10px; padding: 10px 18px; background: #0d0d0d; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; font-size: 13px; color: #999; }
  .action-type { font-weight: 700; color: #e0e0e0; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; }
  .action-type.swap { background: #3b82f620; color: #60a5fa; }
  .action-type.autoResize { background: #f59e0b20; color: #fbbf24; }
  .action-type.dragToColumn, .action-type.dragToColumnAt, .action-type.dragToEmptyCell, .action-type.dragToEmpty { background: #8b5cf620; color: #a78bfa; }
  .action-type.blockedDrag { background: #ef444420; color: #f87171; }
  .action-detail { font-family: monospace; }
  .action-widget { font-weight: 700; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .action-arrow { color: #555; }

  /* ── Grid Panels ── */
  .panels { display: grid; grid-template-columns: 1fr 1fr 1fr; }
  .panel { padding: 18px; }
  .panel + .panel { border-left: 1px solid #1a1a1a; }
  .panel-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #555; margin-bottom: 10px; font-weight: 600; }

  .cell { border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; font-family: monospace; text-transform: uppercase; position: relative; }
  .cell.source { box-shadow: inset 0 0 0 2px #fff; }
  .cell.target { box-shadow: inset 0 0 0 2px #fff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* Expected / Actual coloring */
  .cell.same { opacity: 0.35; }
  .cell.exp-only { box-shadow: inset 0 0 0 2px #22c55e; }
  .cell.act-only { box-shadow: inset 0 0 0 2px #ef4444; }
  .cell.changed { box-shadow: inset 0 0 0 2px #f59e0b; }

  /* ── Verdict ── */
  .verdict-row { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 16px; border-top: 1px solid #1a1a1a; }
  .verdict-btn { height: 44px; padding: 0 28px; border-radius: 10px; border: 2px solid transparent; background: #1a1a1a; cursor: pointer; font-size: 15px; display: flex; align-items: center; gap: 8px; color: #ccc; }
  .verdict-btn:hover { background: #222; }
  .verdict-btn.selected-pass { border-color: #22c55e; background: #14532d; color: #fff; }
  .verdict-btn.selected-bug { border-color: #ef4444; background: #450a0a; color: #fff; }
  .verdict-btn.selected-bad-test { border-color: #666; background: #262626; color: #fff; }

  .drop-zone { border: 2px dashed #333; border-radius: 12px; padding: 48px; text-align: center; color: #555; cursor: pointer; margin-bottom: 20px; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #1a5cff; color: #888; }
  .drop-zone input { display: none; }
  .empty-state { text-align: center; color: #444; padding: 60px 20px; }
</style>
</head>
<body>

<div class="drop-zone" id="dropZone">
  <p>Drop <code>scenarios.json</code> here or click to browse</p>
  <input type="file" id="fileInput" accept=".json">
</div>
<div id="app"></div>

<script>
const COLORS = {
  a:'#3b82f6', b:'#22c55e', c:'#f59e0b', d:'#ef4444', e:'#8b5cf6',
  f:'#ec4899', g:'#14b8a6', h:'#f97316', i:'#06b6d4', j:'#84cc16',
};

let scenarios = [], showAll = false, currentIdx = 0;
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── File loading ──
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      scenarios = (JSON.parse(reader.result)).scenarios || [];
      currentIdx = 0;
      dropZone.style.display = 'none';
      render();
    } catch { alert('Invalid JSON'); }
  };
  reader.readAsText(file);
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
  if (!getFiltered().length) return;
  if (e.key === 'ArrowLeft')  { e.preventDefault(); go(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
  if (e.key === '1') { e.preventDefault(); vote('pass'); }
  if (e.key === '2') { e.preventDefault(); vote('bug'); }
  if (e.key === '3') { e.preventDefault(); vote('bad-test'); }
});

function getFiltered() { return showAll ? scenarios : scenarios.filter(s => s.status === 'unverified'); }
function go(d) { const f = getFiltered(); const n = currentIdx + d; if (n >= 0 && n < f.length) { currentIdx = n; render(); } }
function vote(newStatus) {
  const filtered = getFiltered();
  const s = filtered[currentIdx];
  if (!s) return;
  s.status = s.status === newStatus ? 'unverified' : newStatus;
  const nextFiltered = getFiltered();
  if (currentIdx >= nextFiltered.length) currentIdx = Math.max(0, nextFiltered.length - 1);
  save();
  render();
}

function save() {
  fetch('/api/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ scenarios }, null, 2),
  }).catch(() => {}); // silent — server might not be running
}

// ── Masonry grid rendering ──
const CELL_W = 52;
const CELL_GAP = 3;
const HEIGHT_SCALE = 0.12;
const MIN_H = 24;

function scaledH(id, heights) {
  const px = heights?.[id] || 200;
  return Math.max(MIN_H, Math.round(px * HEIGHT_SCALE));
}

function masonry(data, cols, heights) {
  // Parse grid into widget placements: { id, col, span }
  const placements = [];
  const seen = new Set();
  for (const row of data) {
    for (let c = 0; c < cols; c++) {
      const id = row?.[c];
      if (!id || seen.has(id + ':' + data.indexOf(row))) continue;
      let span = 1;
      while (c + span < cols && row[c + span] === id) span++;
      placements.push({ id, col: c, span });
      seen.add(id + ':' + data.indexOf(row));
    }
  }

  // Bin-pack: track column heights, place each widget
  const colH = new Array(cols).fill(0);
  const positioned = [];
  for (const p of placements) {
    const h = scaledH(p.id, heights);
    let y = 0;
    for (let c = p.col; c < p.col + p.span; c++) y = Math.max(y, colH[c]);
    const w = p.span * CELL_W + (p.span - 1) * CELL_GAP;
    const x = p.col * (CELL_W + CELL_GAP);
    positioned.push({ ...p, x, y, w, h });
    for (let c = p.col; c < p.col + p.span; c++) colH[c] = y + h + CELL_GAP;
  }

  const totalH = Math.max(1, ...colH) - CELL_GAP;
  const totalW = cols * CELL_W + (cols - 1) * CELL_GAP;
  return { positioned, totalH, totalW };
}

function grid(data, cols, highlights, heights) {
  if (!data?.length) return '<div style="color:#444">No data</div>';
  const { positioned, totalH, totalW } = masonry(data, cols, heights);
  let h = `<div style="position:relative;width:${totalW}px;height:${totalH}px">`;
  for (const p of positioned) {
    const bg = COLORS[p.id] || '#666';
    const cls = highlights?.[p.id] || '';
    h += `<div class="cell ${cls}" style="position:absolute;left:${p.x}px;top:${p.y}px;width:${p.w}px;height:${p.h}px;background:${bg}25;color:${bg}">${p.id}</div>`;
  }
  return h + '</div>';
}

function diffGrid(expected, actual, cols) {
  if (!expected || !actual) return '<div style="color:#444">Missing data</div>';
  const rows = Math.max(expected.length, actual.length);
  let h = `<div class="grid-view" style="grid-template-columns:repeat(${cols},52px)">`;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const exp = expected[r]?.[c] ?? null;
      const act = actual[r]?.[c] ?? null;
      if (exp === act) {
        if (exp) { const bg = COLORS[exp]||'#666'; h += `<div class="cell same" style="background:${bg}25;color:${bg}">${exp}</div>`; }
        else h += `<div class="cell empty"></div>`;
      } else if (exp && !act) {
        const bg = COLORS[exp]||'#666'; h += `<div class="cell exp-only" style="color:${bg}">${exp}</div>`;
      } else if (!exp && act) {
        const bg = COLORS[act]||'#666'; h += `<div class="cell act-only" style="background:${bg}25;color:${bg}">${act}</div>`;
      } else {
        const bg = COLORS[act]||'#666'; h += `<div class="cell changed" style="background:${bg}25;color:${bg}">${act}<span style="position:absolute;top:1px;right:3px;font-size:8px;color:#22c55e">${exp}</span></div>`;
      }
    }
  }
  return h + '</div>';
}

// ── Action description ──
function actionBanner(action) {
  const w = id => `<span class="action-widget" style="background:${(COLORS[id]||'#666')}30;color:${COLORS[id]||'#666'}">${id.toUpperCase()}</span>`;
  const arrow = '\u2192';
  const typ = `<span class="action-type ${action.do}">${action.do.replace(/([A-Z])/g,' $1').trim()}</span>`;
  let detail = '';
  switch (action.do) {
    case 'swap':
      detail = `${w(action.source)} <span class="action-arrow">\u2194</span> ${w(action.target)}`;
      break;
    case 'autoResize':
      detail = `Drag ${w(action.source)} to <strong>${action.side}</strong> side of ${w(action.target)} and <em>hold</em>`;
      break;
    case 'dragToColumn':
      detail = `Drag ${w(action.source)} ${arrow} column <strong>${action.col}</strong>`;
      break;
    case 'dragToColumnAt':
      detail = `Drag ${w(action.source)} ${arrow} column <strong>${action.col}</strong> at ${w(action.ref)}'s row`;
      break;
    case 'dragToEmptyCell':
      detail = `Drag ${w(action.source)} ${arrow} empty area, column <strong>${action.col}</strong>`;
      break;
    case 'dragToEmpty':
      detail = `Drag ${w(action.source)} ${arrow} <strong>${action.direction}</strong> into empty space`;
      break;
    case 'blockedDrag':
      detail = `Drag ${w(action.source)} ${arrow} ${w(action.target)} <em>(blocked)</em>`;
      break;
  }
  return `<div class="action-banner">${typ} <span class="action-detail">${detail}</span></div>`;
}

function getHighlights(action) {
  const h = {};
  if (action.source) h[action.source] = 'source';
  if (action.target) h[action.target] = 'target';
  if (action.ref) h[action.ref] = 'target';
  return h;
}

// ── Main render ──
function render() {
  const filtered = getFiltered();
  const unverifiedCount = scenarios.filter(s => s.status === 'unverified').length;
  const passCount = scenarios.filter(s => s.status === 'pass').length;
  const bugCount = scenarios.filter(s => s.status === 'bug').length;
  const badCount = scenarios.filter(s => s.status === 'bad-test').length;
  if (currentIdx >= filtered.length) currentIdx = Math.max(0, filtered.length - 1);
  const s = filtered[currentIdx];

  let h = `
    <div class="toolbar">
      <label><input type="checkbox" id="showAllToggle" ${showAll?'checked':''}> Show all</label>
      <div class="counter">${unverifiedCount} pending \u00b7 ${passCount} verified \u00b7 ${bugCount} bugs \u00b7 ${badCount} bad</div>
      <div class="spacer"></div>
      <span style="font-size:12px;color:#555">auto-saves</span>
    </div>
    <div class="nav">
      <button class="nav-arrow" onclick="go(-1)" ${currentIdx<=0?'disabled':''}>\u2190</button>
      <div class="nav-pos">${filtered.length ? currentIdx+1 : 0} / ${filtered.length}</div>
      <button class="nav-arrow" onclick="go(1)" ${currentIdx>=filtered.length-1?'disabled':''}>\u2192</button>
      <span class="kbd">\u2190 \u2192</span>
      <div class="spacer"></div>
      <span style="font-size:11px;color:#555">1 verified \u00b7 2 bug \u00b7 3 bad test</span>
    </div>`;

  if (!s) { h += '<div class="empty-state">No tests to show</div>'; }
  else {
    const fail = s.failedAtStep ?? -1;
    const si = fail >= 0 ? fail : s.steps.length - 1;
    const step = s.steps[si];
    const before = fail === 0 ? s.initialGrid : (s.steps[si-1]?.actual ?? s.initialGrid);
    h += `
      <div class="card ${s.status}">
        <div class="card-header">
          <div class="status-dot ${s.status}"></div>
          <div class="card-title">${s.name} <span class="step-info">\u00b7 step ${si}/${s.steps.length-1}</span></div>
          <span class="status-badge ${s.status}">${s.status}</span>
        </div>
        ${step ? actionBanner(step.action) : ''}
        ${s.failureReason ? `<div style="padding:8px 18px;font-size:12px;color:#f87171;background:#1a0a0a;border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;font-family:monospace;white-space:pre-wrap;overflow-x:auto;max-height:60px;overflow-y:auto">${escHtml(s.failureReason)}</div>` : ''}
        <div class="panels">
          <div class="panel">
            <div class="panel-label">Before</div>
            ${grid(before, s.maxColumns, step ? getHighlights(step.action) : {}, s.widgetHeights)}
          </div>
          <div class="panel">
            <div class="panel-label" style="color:#22c55e">Expected</div>
            ${step ? grid(step.expected, s.maxColumns, {}, s.widgetHeights) : ''}
          </div>
          <div class="panel">
            <div class="panel-label" style="color:#ef4444">Actual</div>
            ${step ? grid(step.actual, s.maxColumns, {}, s.widgetHeights) : ''}
          </div>
        </div>
        <div class="verdict-row">
          <button class="verdict-btn ${s.status==='pass'?'selected-pass':''}" onclick="vote('pass')" title="Good test, engine correct \u2014 add to regression suite">
            \u2705 Verified <span class="kbd">1</span>
          </button>
          <button class="verdict-btn ${s.status==='bug'?'selected-bug':''}" onclick="vote('bug')" title="Good test, engine wrong \u2014 this is a bug to fix">
            \ud83d\udc1b Bug <span class="kbd">2</span>
          </button>
          <button class="verdict-btn ${s.status==='bad-test'?'selected-bad-test':''}" onclick="vote('bad-test')" title="Bad test \u2014 scenario is invalid, discard">
            \ud83d\uddd1 Bad test <span class="kbd">3</span>
          </button>
        </div>
      </div>`;
  }

  document.getElementById('app').innerHTML = h;
  document.getElementById('showAllToggle')?.addEventListener('change', e => { showAll = e.target.checked; currentIdx = 0; render(); });
  document.activeElement?.blur();
}


// Auto-load scenarios.json from same directory
(async () => {
  try {
    const resp = await fetch('./suite/scenarios.json');
    if (resp.ok) {
      scenarios = (await resp.json()).scenarios || [];
      currentIdx = 0;
      dropZone.style.display = 'none';
      render();
    } else {
      render();
    }
  } catch { render(); }
})();
</script>
</body>
</html>
