<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 24px; max-width: 960px; margin: 0 auto; }

  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
  .counter { font-size: 13px; color: #888; }
  .spacer { flex: 1; }

  /* ── Card ── */
  .card { background: #111; border-radius: 12px; overflow: hidden; }
  .card.pass { border: 1px solid #22c55e30; }
  .card.bug { border: 1px solid #ef444440; }
  .card.bad-test { border: 1px solid #66666640; }
  .card.unverified { border: 1px solid #f59e0b30; }

  .card-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.pass { background: #22c55e; }
  .status-dot.bug { background: #ef4444; }
  .status-dot.bad-test { background: #666; }
  .status-dot.unverified { background: #f59e0b; }
  .card-title { font-size: 14px; font-weight: 600; flex: 1; }
  .step-info { color: #666; font-weight: 400; font-size: 13px; }
  .status-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
  .status-badge.pass { background: #14532d; color: #4ade80; }
  .status-badge.bug { background: #450a0a; color: #f87171; }
  .status-badge.bad-test { background: #262626; color: #999; }
  .status-badge.unverified { background: #422006; color: #fbbf24; }

  /* ── Action Banner ── */
  .action-banner { display: flex; align-items: center; gap: 10px; padding: 10px 18px; background: #0d0d0d; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; font-size: 13px; color: #999; }
  .action-type { font-weight: 700; color: #e0e0e0; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px; }
  .action-type.swap { background: #3b82f620; color: #60a5fa; }
  .action-type.autoResize { background: #f59e0b20; color: #fbbf24; }
  .action-type.dragToColumn, .action-type.dragToColumnAt, .action-type.dragToEmptyCell, .action-type.dragToEmpty { background: #8b5cf620; color: #a78bfa; }
  .action-type.blockedDrag { background: #ef444420; color: #f87171; }
  .action-detail { font-family: monospace; }
  .action-widget { font-weight: 700; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .action-arrow { color: #555; }

  /* ── Grid Panels ── */
  .panels { display: grid; grid-template-columns: 1fr 1fr 1fr; }
  .panel { padding: 18px; }
  .panel + .panel { border-left: 1px solid #1a1a1a; }
  .panel-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #555; margin-bottom: 10px; font-weight: 600; }

  .cell { border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; font-family: monospace; text-transform: uppercase; position: relative; }
  .cell.source { box-shadow: inset 0 0 0 2px #fff; }
  .cell.target { box-shadow: inset 0 0 0 2px #fff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* Expected / Actual coloring */
  .cell.same { opacity: 0.35; }
  .cell.exp-only { box-shadow: inset 0 0 0 2px #22c55e; }
  .cell.act-only { box-shadow: inset 0 0 0 2px #ef4444; }
  .cell.changed { box-shadow: inset 0 0 0 2px #f59e0b; }

  /* ── Verdict ── */
  .verdict-row { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 16px; border-top: 1px solid #1a1a1a; }
  .verdict-btn { height: 44px; padding: 0 28px; border-radius: 10px; border: 2px solid transparent; background: #1a1a1a; cursor: pointer; font-size: 15px; display: flex; align-items: center; gap: 8px; color: #ccc; }
  .verdict-btn:hover { background: #222; }
  .verdict-btn.selected-pass { border-color: #22c55e; background: #14532d; color: #fff; }
  .verdict-btn.selected-bug { border-color: #ef4444; background: #450a0a; color: #fff; }
  .verdict-btn.selected-bad-test { border-color: #666; background: #262626; color: #fff; }

  /* ── Groups ── */
  .group { margin-bottom: 16px; }
  .group-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #141414; border-radius: 8px; cursor: pointer; user-select: none; }
  .group-header:hover { background: #1a1a1a; }
  .group-chevron { font-size: 10px; color: #555; width: 14px; }
  .group-label { font-size: 14px; font-weight: 600; flex: 1; }
  .group-count { font-size: 13px; color: #666; font-variant-numeric: tabular-nums; }
  .group-body { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }

  /* ── Compact row ── */
  .card-row { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 8px; cursor: pointer; background: #111; border: 1px solid transparent; }
  .card-row:hover { background: #161616; }
  .card-row.unverified { border-color: #f59e0b15; }
  .card-row.pass { border-color: #22c55e15; }
  .card-row.bug { border-color: #ef444415; }
  .card-row.bad-test { border-color: #66666615; }
  .card-row-name { font-size: 13px; font-weight: 500; flex: 1; font-family: monospace; }
  .card-row-meta { font-size: 12px; color: #555; }

  .drop-zone { border: 2px dashed #333; border-radius: 12px; padding: 48px; text-align: center; color: #555; cursor: pointer; margin-bottom: 20px; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #1a5cff; color: #888; }
  .drop-zone input { display: none; }
  .empty-state { text-align: center; color: #444; padding: 60px 20px; }

  /* ── AI Confidence ── */
  .confidence-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; font-variant-numeric: tabular-nums; }
  .confidence-badge.high { background: #14532d; color: #4ade80; }
  .confidence-badge.medium { background: #422006; color: #fbbf24; }
  .confidence-badge.low { background: #450a0a; color: #f87171; }
  .confidence-badge.none { background: #1a1a1a; color: #555; }

  .ai-reasoning { padding: 12px 18px; font-size: 12px; color: #aaa; background: #0d0d0d; border-top: 1px solid #1a1a1a; line-height: 1.5; }
  .ai-reasoning summary { cursor: pointer; color: #888; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

  .invariant-errors { padding: 8px 18px; font-size: 12px; color: #f87171; background: #1a0808; border-top: 1px solid #2a1010; font-family: monospace; }

  /* ── Feedback Controls ── */
  .feedback-row { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-top: 1px solid #1a1a1a; background: #0a0a0a; }
  .feedback-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .feedback-btn:hover { background: #222; }
  .feedback-btn.selected-agree { border-color: #22c55e; background: #14532d; }
  .feedback-btn.selected-disagree { border-color: #ef4444; background: #450a0a; }
  .feedback-input { flex: 1; height: 36px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; padding: 0 12px; font-size: 13px; font-family: inherit; }
  .feedback-input::placeholder { color: #555; }
  .feedback-send { height: 36px; padding: 0 16px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; cursor: pointer; font-size: 13px; }
  .feedback-send:hover { background: #222; }

  /* ── Batch & Sort ── */
  .batch-btn { height: 32px; padding: 0 14px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 12px; }
  .batch-btn:hover { background: #222; }
  select.sort-select { height: 28px; border-radius: 5px; border: 1px solid #333; background: #1a1a1a; color: #888; font-size: 11px; padding: 0 8px; }
</style>
</head>
<body>

<div class="drop-zone" id="dropZone">
  <p>Drop <code>scenarios.json</code> here or click to browse</p>
  <input type="file" id="fileInput" accept=".json">
</div>
<div id="app"></div>

<script>
const COLORS = {
  a:'#3b82f6', b:'#22c55e', c:'#f59e0b', d:'#ef4444', e:'#8b5cf6',
  f:'#ec4899', g:'#14b8a6', h:'#f97316', i:'#06b6d4', j:'#84cc16',
};

let currentSort = 'default';

let scenarioMap = {}, expandedHash = null;
function scenarioList() { return Object.values(scenarioMap); }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function confidenceClass(c) {
  if (c === null || c === undefined) return 'none';
  if (c >= 70) return 'high';
  if (c >= 40) return 'medium';
  return 'low';
}

function confidenceBadge(c) {
  if (c === null || c === undefined) return '<span class="confidence-badge none">no AI</span>';
  return `<span class="confidence-badge ${confidenceClass(c)}">${c}%</span>`;
}

function giveFeedback(hash, verdict) {
  const s = scenarioMap[hash];
  if (!s) return;
  if (!s.humanFeedback) s.humanFeedback = { verdict: null, comment: null, timestamp: null };
  s.humanFeedback.verdict = s.humanFeedback.verdict === verdict ? null : verdict;
  s.humanFeedback.timestamp = new Date().toISOString();
  save();
  render();
}

function submitFeedbackComment(hash) {
  const input = document.getElementById('feedback-' + hash);
  if (!input) return;
  const comment = input.value.trim();
  if (!comment) return;
  const s = scenarioMap[hash];
  if (!s || !s.humanFeedback) return;
  s.humanFeedback.comment = comment;
  save();
  fetch('/api/feedback', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      hash,
      aiConfidence: s.confidence,
      aiReasoning: s.aiReasoning,
      humanVerdict: 'disagree',
      humanComment: comment,
      scenarioSummary: { layout: s.layout, maxColumns: s.maxColumns, actionDo: s.steps?.[0]?.action?.do || 'unknown' },
      timestamp: new Date().toISOString(),
    }),
  }).catch(() => {});
  render();
}

function batchApproveHighConfidence() {
  const high = scenarioList().filter(s =>
    s.status === 'unverified' && s.confidence !== null && s.confidence >= 70 && s.invariantResult === 'pass'
  );
  if (!high.length) return alert('No high-confidence scenarios to approve.');
  if (!confirm('Approve ' + high.length + ' scenarios with confidence >= 70%?')) return;
  for (const s of high) s.status = 'pass';
  save();
  render();
}

// ── File loading ──
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      scenarioMap = (JSON.parse(reader.result)).scenarios || {};
      expandedHash = null;
      dropZone.style.display = 'none';
      render();
    } catch { alert('Invalid JSON'); }
  };
  reader.readAsText(file);
}

function toggleExpand(hash) {
  expandedHash = expandedHash === hash ? null : hash;
  render();
  if (expandedHash) {
    const el = document.getElementById('card-' + hash);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function vote(hash, newStatus) {
  const s = scenarioMap[hash];
  if (!s) return;
  s.status = s.status === newStatus ? 'unverified' : newStatus;
  save();
  render();
}

function save() {
  fetch('/api/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ scenarios: scenarioMap }, null, 2),
  }).catch(() => {});
}

const GROUPS = [
  { key: 'unverified', label: 'Pending', icon: '\u23f3' },
  { key: 'ai-confident', label: 'AI Confident (70+)', icon: '\ud83e\udd16' },
  { key: 'bug', label: 'Bugs', icon: '\ud83d\udc1b' },
  { key: 'bad-test', label: 'Bad Tests', icon: '\ud83d\uddd1' },
  { key: 'pass', label: 'Verified', icon: '\u2705' },
];
const collapsedGroups = new Set();

// ── Masonry grid rendering ──
const CELL_W = 52;
const CELL_GAP = 3;
const HEIGHT_SCALE = 0.12;
const MIN_H = 24;

function scaledH(id, heights) {
  const px = heights?.[id] || 200;
  return Math.max(MIN_H, Math.round(px * HEIGHT_SCALE));
}

function masonry(data, cols, heights) {
  // Parse grid into widget placements: { id, col, span }
  const placements = [];
  const seen = new Set();
  for (const row of data) {
    for (let c = 0; c < cols; c++) {
      const id = row?.[c];
      if (!id || seen.has(id + ':' + data.indexOf(row))) continue;
      let span = 1;
      while (c + span < cols && row[c + span] === id) span++;
      placements.push({ id, col: c, span });
      seen.add(id + ':' + data.indexOf(row));
    }
  }

  // Bin-pack: track column heights, place each widget
  const colH = new Array(cols).fill(0);
  const positioned = [];
  for (const p of placements) {
    const h = scaledH(p.id, heights);
    let y = 0;
    for (let c = p.col; c < p.col + p.span; c++) y = Math.max(y, colH[c]);
    const w = p.span * CELL_W + (p.span - 1) * CELL_GAP;
    const x = p.col * (CELL_W + CELL_GAP);
    positioned.push({ ...p, x, y, w, h });
    for (let c = p.col; c < p.col + p.span; c++) colH[c] = y + h + CELL_GAP;
  }

  const totalH = Math.max(1, ...colH) - CELL_GAP;
  const totalW = cols * CELL_W + (cols - 1) * CELL_GAP;
  return { positioned, totalH, totalW };
}

function grid(data, cols, highlights, heights) {
  if (!data?.length) return '<div style="color:#444">No data</div>';
  const { positioned, totalH, totalW } = masonry(data, cols, heights);
  let h = `<div style="position:relative;width:${totalW}px;height:${totalH}px">`;
  for (const p of positioned) {
    const bg = COLORS[p.id] || '#666';
    const cls = highlights?.[p.id] || '';
    h += `<div class="cell ${cls}" style="position:absolute;left:${p.x}px;top:${p.y}px;width:${p.w}px;height:${p.h}px;background:${bg}25;color:${bg}">${p.id}</div>`;
  }
  return h + '</div>';
}

function diffGrid(expected, actual, cols) {
  if (!expected || !actual) return '<div style="color:#444">Missing data</div>';
  const rows = Math.max(expected.length, actual.length);
  let h = `<div class="grid-view" style="grid-template-columns:repeat(${cols},52px)">`;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const exp = expected[r]?.[c] ?? null;
      const act = actual[r]?.[c] ?? null;
      if (exp === act) {
        if (exp) { const bg = COLORS[exp]||'#666'; h += `<div class="cell same" style="background:${bg}25;color:${bg}">${exp}</div>`; }
        else h += `<div class="cell empty"></div>`;
      } else if (exp && !act) {
        const bg = COLORS[exp]||'#666'; h += `<div class="cell exp-only" style="color:${bg}">${exp}</div>`;
      } else if (!exp && act) {
        const bg = COLORS[act]||'#666'; h += `<div class="cell act-only" style="background:${bg}25;color:${bg}">${act}</div>`;
      } else {
        const bg = COLORS[act]||'#666'; h += `<div class="cell changed" style="background:${bg}25;color:${bg}">${act}<span style="position:absolute;top:1px;right:3px;font-size:8px;color:#22c55e">${exp}</span></div>`;
      }
    }
  }
  return h + '</div>';
}

// ── Action description ──
function actionBanner(action) {
  const w = id => `<span class="action-widget" style="background:${(COLORS[id]||'#666')}30;color:${COLORS[id]||'#666'}">${id.toUpperCase()}</span>`;
  const arrow = '\u2192';
  const typ = `<span class="action-type ${action.do}">${action.do.replace(/([A-Z])/g,' $1').trim()}</span>`;
  let detail = '';
  switch (action.do) {
    case 'swap':
      detail = `${w(action.source)} <span class="action-arrow">\u2194</span> ${w(action.target)}`;
      break;
    case 'autoResize':
      detail = `Drag ${w(action.source)} to <strong>${action.side}</strong> side of ${w(action.target)} and <em>hold</em>`;
      break;
    case 'dragToColumn':
      detail = `Drag ${w(action.source)} ${arrow} column <strong>${action.col}</strong>`;
      break;
    case 'dragToColumnAt':
      detail = `Drag ${w(action.source)} ${arrow} column <strong>${action.col}</strong> at ${w(action.ref)}'s row`;
      break;
    case 'dragToEmptyCell':
      detail = `Drag ${w(action.source)} ${arrow} empty area, column <strong>${action.col}</strong>`;
      break;
    case 'dragToEmpty':
      detail = `Drag ${w(action.source)} ${arrow} <strong>${action.direction}</strong> into empty space`;
      break;
    case 'blockedDrag':
      detail = `Drag ${w(action.source)} ${arrow} ${w(action.target)} <em>(blocked)</em>`;
      break;
  }
  return `<div class="action-banner">${typ} <span class="action-detail">${detail}</span></div>`;
}

function getHighlights(action) {
  const h = {};
  if (action.source) h[action.source] = 'source';
  if (action.target) h[action.target] = 'target';
  if (action.ref) h[action.ref] = 'target';
  return h;
}

function renderCard(s, expanded) {
  const hash = s.hash;
  const fail = s.failedAtStep ?? -1;
  const si = fail >= 0 ? fail : s.steps.length - 1;
  const step = s.steps[si];
  const before = fail === 0 ? s.initialGrid : (s.steps[si-1]?.actual ?? s.initialGrid);

  if (!expanded) {
    return `
      <div class="card-row ${s.status}" onclick="toggleExpand('${hash}')">
        <div class="status-dot ${s.status}"></div>
        <span class="card-row-name">${escHtml(s.name)}</span>
        ${confidenceBadge(s.confidence)}
        <span class="card-row-meta">${s.steps.length} steps &middot; ${s.maxColumns}col</span>
      </div>`;
  }

  return `
    <div class="card ${s.status}" id="card-${hash}">
      <div class="card-header" style="cursor:pointer" onclick="toggleExpand('${hash}')">
        <div class="status-dot ${s.status}"></div>
        <div class="card-title">${escHtml(s.name)}${s.steps.length > 1 ? ` <span class="step-info">&middot; step ${si}/${s.steps.length-1}</span>` : ''}</div>
        ${confidenceBadge(s.confidence)}
        <span class="status-badge ${s.status}">${escHtml(s.status)}</span>
      </div>
      ${step ? actionBanner(step.action) : ''}
      ${s.failureReason ? `<div style="padding:8px 18px;font-size:12px;color:#f87171;background:#1a0a0a;border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;font-family:monospace;white-space:pre-wrap;overflow-x:auto;max-height:60px;overflow-y:auto">${escHtml(s.failureReason)}</div>` : ''}
      ${s.invariantErrors?.length ? `<div class="invariant-errors">${s.invariantErrors.map(escHtml).join('<br>')}</div>` : ''}
      <div class="panels" style="grid-template-columns:${step?.aiProposed ? '1fr 1fr 1fr' : '1fr 1fr 1fr'}">
        <div class="panel">
          <div class="panel-label">Before</div>
          ${grid(before, s.maxColumns, step ? getHighlights(step.action) : {}, s.widgetHeights)}
        </div>
        <div class="panel">
          <div class="panel-label" style="color:#60a5fa">Engine Result</div>
          ${step ? grid(step.expected, s.maxColumns, {}, s.widgetHeights) : ''}
        </div>
        <div class="panel">
          <div class="panel-label" style="color:${step?.aiProposed ? '#f59e0b' : '#555'}">${step?.aiProposed ? 'AI Proposed' : 'AI Proposed'}</div>
          ${step?.aiProposed ? grid(step.aiProposed, s.maxColumns, {}, s.widgetHeights) : '<div style="color:#444;font-size:12px;padding-top:8px">No alternative proposed</div>'}
        </div>
      </div>
      ${s.aiReasoning ? `<div class="ai-reasoning"><details><summary>AI Reasoning</summary><p style="margin-top:8px">${escHtml(s.aiReasoning)}</p></details></div>` : ''}
      <div class="verdict-row">
        <button class="verdict-btn ${s.status==='pass'?'selected-pass':''}" onclick="event.stopPropagation();vote('${hash}','pass')">Verified</button>
        <button class="verdict-btn ${s.status==='bug'?'selected-bug':''}" onclick="event.stopPropagation();vote('${hash}','bug')">Bug</button>
        <button class="verdict-btn ${s.status==='bad-test'?'selected-bad-test':''}" onclick="event.stopPropagation();vote('${hash}','bad-test')">Bad test</button>
      </div>
      ${s.aiReasoning ? `
        <div class="feedback-row">
          <button class="feedback-btn ${s.humanFeedback?.verdict==='agree'?'selected-agree':''}" onclick="event.stopPropagation();giveFeedback('${hash}','agree')" title="AI was right">\ud83d\udc4d</button>
          <button class="feedback-btn ${s.humanFeedback?.verdict==='disagree'?'selected-disagree':''}" onclick="event.stopPropagation();giveFeedback('${hash}','disagree')" title="AI was wrong">\ud83d\udc4e</button>
          ${s.humanFeedback?.verdict === 'disagree' ? `
            <input class="feedback-input" id="feedback-${hash}" placeholder="Why was the AI wrong?" value="${escHtml(s.humanFeedback?.comment || '')}" onkeydown="if(event.key==='Enter'){event.stopPropagation();submitFeedbackComment('${hash}')}">
            <button class="feedback-send" onclick="event.stopPropagation();submitFeedbackComment('${hash}')">Send</button>
          ` : ''}
          ${s.humanFeedback?.comment ? `<span style="font-size:11px;color:#666">Feedback sent</span>` : ''}
        </div>
      ` : ''}
    </div>`;
}

// ── Main render ──
function render() {
  const app = document.getElementById('app');
  const all = scenarioList();
  if (!all.length) {
    app.textContent = 'No scenarios loaded';
    app.className = 'empty-state';
    return;
  }
  app.className = '';

  let h = `<div class="toolbar">
    <div class="counter">${all.length} total</div>
    <select class="sort-select" onchange="currentSort=this.value;render()">
      <option value="default" ${currentSort==='default'?'selected':''}>Default</option>
      <option value="confidence-asc" ${currentSort==='confidence-asc'?'selected':''}>Confidence (low first)</option>
      <option value="confidence-desc" ${currentSort==='confidence-desc'?'selected':''}>Confidence (high first)</option>
    </select>
    <div class="spacer"></div>
    <button class="batch-btn" onclick="batchApproveHighConfidence()">Approve all high-confidence</button>
    <span style="font-size:12px;color:#555">auto-saves</span>
  </div>`;

  const grouped = {};
  for (const g of GROUPS) grouped[g.key] = [];
  for (const s of all) {
    if (s.status === 'unverified' && s.confidence !== null && s.confidence >= 70 && s.invariantResult === 'pass') {
      grouped['ai-confident'].push(s);
    } else {
      (grouped[s.status] || grouped['unverified']).push(s);
    }
  }

  const sortFn = currentSort === 'confidence-asc'
    ? (a, b) => (a.confidence ?? 999) - (b.confidence ?? 999)
    : currentSort === 'confidence-desc'
    ? (a, b) => (b.confidence ?? -1) - (a.confidence ?? -1)
    : null;
  if (sortFn) for (const key in grouped) grouped[key].sort(sortFn);

  for (const g of GROUPS) {
    const items = grouped[g.key];
    if (!items.length) continue;
    const collapsed = collapsedGroups.has(g.key);
    h += `<div class="group">
        <div class="group-header" onclick="collapsedGroups.has('${g.key}')?collapsedGroups.delete('${g.key}'):collapsedGroups.add('${g.key}');render()">
          <span class="group-chevron">${collapsed ? '\u25b6' : '\u25bc'}</span>
          <span class="status-dot ${g.key}"></span>
          <span class="group-label">${g.label}</span>
          <span class="group-count">${items.length}</span>
        </div>
        ${collapsed ? '' : `<div class="group-body">${items.map(s => renderCard(s, expandedHash === s.hash)).join('')}</div>`}
      </div>`;
  }

  app.innerHTML = h;
}


// Auto-load scenarios.json from same directory
(async () => {
  try {
    const resp = await fetch('./suite/scenarios.json');
    if (resp.ok) {
      scenarioMap = (await resp.json()).scenarios || {};
      expandedHash = null;
      dropZone.style.display = 'none';
      render();
    } else {
      render();
    }
  } catch { render(); }
})();
</script>
</body>
</html>
